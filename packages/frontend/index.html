<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc-web — 远程 Claude Code</title>
    <script>
      (function () {
        const storedTheme = localStorage.getItem("cc-web-theme");
        let theme = null;
        try { theme = storedTheme ? JSON.parse(storedTheme) : null; } catch { theme = null; }
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
